<!DOCTYPE html>
<html>
<head>
<title>حفظ الأيقونة</title>
<style>
  body { font-family: Arial; background: #1a0010; color: white; text-align: center; padding: 40px; }
  canvas { border-radius: 20px; display: block; margin: 20px auto; }
  .btn { display: inline-block; margin: 10px; padding: 15px 30px; background: #d81b60; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; text-decoration: none; border-radius: 50px; }
  .btn:hover { background: #ff758c; }
  h2 { color: #ff758c; }
  .step { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin: 20px auto; max-width: 500px; text-align: right; direction: rtl; }
  .step ol { padding-right: 20px; line-height: 2; }
</style>
</head>
<body>
<h2>🎨 الأيقونة جاهزة للحفظ</h2>
<canvas id="c512" width="512" height="512"></canvas>

<div class="step">
  <strong>📋 التعليمات:</strong>
  <ol>
    <li>اضغط زر "حفظ icon-512.png" وحمّله</li>
    <li>اضغط زر "حفظ icon-192.png" وحمّله</li>
    <li>انقل الملفين لمجلد: <code>d:\AI AGENT\LOVER 2\</code></li>
  </ol>
</div>

<a id="dl512" class="btn">💾 حفظ icon-512.png</a>
<a id="dl192" class="btn">💾 حفظ icon-192.png</a>

<script>
const c = document.getElementById('c512');
const ctx = c.getContext('2d');

// Gradient background
const grad = ctx.createLinearGradient(0, 0, 512, 512);
grad.addColorStop(0, '#ff758c');
grad.addColorStop(1, '#c2185b');
ctx.fillStyle = grad;
// Rounded rect
ctx.beginPath();
ctx.roundRect(0, 0, 512, 512, 80);
ctx.fill();

// Draw heart
ctx.fillStyle = 'white';
ctx.shadowColor = 'rgba(255, 150, 180, 0.9)';
ctx.shadowBlur = 40;

function drawHeart(ctx, x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size, size);
  ctx.beginPath();
  ctx.moveTo(0, -0.3);
  ctx.bezierCurveTo(0, -1, -1.5, -1, -1.5, 0.1);
  ctx.bezierCurveTo(-1.5, 0.8, -0.5, 1.3, 0, 1.8);
  ctx.bezierCurveTo(0.5, 1.3, 1.5, 0.8, 1.5, 0.1);
  ctx.bezierCurveTo(1.5, -1, 0, -1, 0, -0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

drawHeart(ctx, 256, 200, 130);

// Make 192 version
const c192 = document.createElement('canvas');
c192.width = 192; c192.height = 192;
const ctx2 = c192.getContext('2d');
ctx2.drawImage(c, 0, 0, 192, 192);

// Set download links
document.getElementById('dl512').href = c.toDataURL('image/png');
document.getElementById('dl512').download = 'icon-512.png';
document.getElementById('dl192').href = c192.toDataURL('image/png');
document.getElementById('dl192').download = 'icon-192.png';
</script>
</body>
</html>
